<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brawl Gradient Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 16px;
      background: #0d0f14;
      color: #f4f6fb;
      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body.modal-open {
      overflow: hidden;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .description {
      margin: 0 0 28px;
      color: #999fad;
      line-height: 1.6;
    }

    .card {
      padding: 22px;
      margin-bottom: 18px;
      border: 1px solid #292d38;
      border-radius: 18px;
      background: #171a21;
    }

    .field {
      margin-bottom: 20px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 9px;
      color: #c8ccd6;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid #333846;
      border-radius: 11px;
      outline: none;
      background: #0f1117;
      color: #ffffff;
      transition: border-color 0.2s;
    }

    input[type="text"] {
      height: 46px;
      padding: 0 14px;
    }

    textarea {
      min-height: 120px;
      padding: 14px;
      resize: vertical;
      line-height: 1.6;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #6d76ff;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .color-box {
      padding: 12px;
      border: 1px solid #303542;
      border-radius: 12px;
      background: #101218;
    }

    .color-box label {
      margin-bottom: 8px;
    }

    .color-input-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .color-swatch {
      flex: 0 0 44px;
      width: 44px;
      height: 40px;
      padding: 0;
      border: 1px solid #4a5060;
      border-radius: 9px;
      background: #000;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .color-swatch:hover {
      transform: none;
      filter: brightness(1.08);
    }

    .hex-input {
      min-width: 0;
      height: 40px !important;
      padding: 0 10px !important;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .range-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    #midValue {
      color: #8f96ff;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .check-row label {
      margin: 0;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 11px 16px;
      border: 1px solid #353a47;
      border-radius: 10px;
      background: #242832;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition:
        transform 0.15s,
        background 0.15s;
    }

    button:hover {
      background: #303541;
      transform: translateY(-1px);
    }

    button.primary {
      border-color: #6871ff;
      background: #5963f3;
    }

    button.primary:hover {
      background: #6871ff;
    }

    .preview {
      min-height: 100px;
      padding: 20px;
      overflow-wrap: anywhere;
      border: 1px solid #303542;
      border-radius: 12px;
      background: #090b0f;
      font-size: 25px;
      font-weight: 800;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
    }

    .output-header label {
      margin: 0;
    }

    .stats {
      margin-top: 9px;
      color: #8f95a4;
      font-size: 13px;
    }

    .message {
      min-height: 22px;
      margin-top: 10px;
      color: #75e2a6;
      font-size: 14px;
    }

    /* 커스텀 컬러 피커 */
    .picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(3px);
    }

    .picker-backdrop[hidden] {
      display: none;
    }

    .picker-dialog {
      width: min(650px, 100%);
      padding: 24px;
      border: 1px solid #404550;
      border-radius: 22px;
      background: #292b31;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
    }

    .picker-dialog h2 {
      margin: 0 0 20px;
      font-size: 23px;
    }

    .picker-control {
      margin-bottom: 20px;
    }

    .picker-control label {
      margin-bottom: 8px;
      color: #f1f1f4;
      font-size: 16px;
    }

    .picker-slider {
      width: 100%;
      height: 52px;
      margin: 0;
      appearance: none;
      border: 1px solid #9da1aa;
      border-radius: 4px;
      outline: none;
      background: #000;
    }

    .picker-slider::-webkit-slider-thumb {
      width: 25px;
      height: 61px;
      appearance: none;
      border: 2px solid #006995;
      border-radius: 5px;
      background: #00a9e8;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      cursor: grab;
    }

    .picker-slider::-moz-range-thumb {
      width: 23px;
      height: 57px;
      border: 2px solid #006995;
      border-radius: 5px;
      background: #00a9e8;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      cursor: grab;
    }

    .picker-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
    }

    .picker-selected {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f1f1f4;
      font-weight: 700;
    }

    .picker-preview {
      width: 48px;
      height: 48px;
      border: 2px solid #111318;
      border-radius: 6px;
      background: #ff0000;
      box-shadow: 0 0 0 1px #6c717d;
    }

    .picker-hex {
      min-width: 92px;
      color: #dfe2e8;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .picker-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .picker-actions button {
      border: 0;
      background: transparent;
      color: #9bb8ff;
    }

    .picker-actions button:hover {
      background: rgba(120, 150, 255, 0.08);
      transform: none;
    }

    @media (max-width: 600px) {
      body {
        padding-top: 24px;
      }

      h1 {
        font-size: 25px;
      }

      .color-grid {
        grid-template-columns: 1fr;
      }

      .preview {
        font-size: 21px;
      }

      .picker-dialog {
        padding: 20px;
      }

      .picker-slider {
        height: 46px;
      }

      .picker-slider::-webkit-slider-thumb {
        height: 55px;
      }

      .picker-bottom {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Brawl Gradient Generator</h1>

    <p class="description">
      브롤스타즈 색상 태그 형식으로 글자별 그라데이션 코드를 생성합니다.
    </p>

    <section class="card">
      <div class="field">
        <label for="prefix">그라데이션을 적용하지 않을 앞부분</label>
        <input
          id="prefix"
          type="text"
          value="Hello "
          placeholder="예: Hello "
        >
      </div>

      <div class="field">
        <label for="gradientText">그라데이션을 적용할 텍스트</label>
        <textarea
          id="gradientText"
          placeholder="그라데이션 텍스트를 입력하세요."
        >World</textarea>
      </div>

      <div class="field">
        <label>그라데이션 색상</label>

        <div class="color-grid">
          <div class="color-box">
            <label for="startHex">시작 색상</label>
            <div class="color-input-row">
              <input id="startColor" type="hidden" value="#d40000">
              <button
                class="color-swatch"
                type="button"
                data-color-input="startColor"
                data-hex-input="startHex"
                aria-label="시작 색상 선택"
              ></button>
              <input
                id="startHex"
                class="hex-input"
                type="text"
                value="#d40000"
                maxlength="7"
              >
            </div>
          </div>

          <div class="color-box">
            <label for="middleHex">중간 색상</label>
            <div class="color-input-row">
              <input id="middleColor" type="hidden" value="#000000">
              <button
                class="color-swatch"
                type="button"
                data-color-input="middleColor"
                data-hex-input="middleHex"
                aria-label="중간 색상 선택"
              ></button>
              <input
                id="middleHex"
                class="hex-input"
                type="text"
                value="#000000"
                maxlength="7"
              >
            </div>
          </div>

          <div class="color-box">
            <label for="endHex">끝 색상</label>
            <div class="color-input-row">
              <input id="endColor" type="hidden" value="#a90000">
              <button
                class="color-swatch"
                type="button"
                data-color-input="endColor"
                data-hex-input="endHex"
                aria-label="끝 색상 선택"
              ></button>
              <input
                id="endHex"
                class="hex-input"
                type="text"
                value="#a90000"
                maxlength="7"
              >
            </div>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="range-header">
          <label for="midpoint">중간 색상 위치</label>
          <span id="midValue">60%</span>
        </div>

        <input
          id="midpoint"
          type="range"
          min="5"
          max="95"
          value="60"
        >
      </div>

      <div class="field check-row">
        <input id="skipSpaces" type="checkbox" checked>
        <label for="skipSpaces">
          공백 앞에는 색상 코드를 넣지 않기
        </label>
      </div>

      <div class="button-row">
        <button id="sampleButton" type="button">예시 불러오기</button>
        <button id="swapButton" type="button">시작·끝 색상 교체</button>
        <button id="resetButton" type="button">초기화</button>
      </div>
    </section>

    <section class="card">
      <div class="field">
        <label>미리보기</label>
        <div id="preview" class="preview"></div>
      </div>

      <div class="field">
        <div class="output-header">
          <label for="output">생성된 코드</label>
          <button id="copyButton" class="primary" type="button">복사</button>
        </div>

        <textarea id="output" readonly></textarea>
        <div id="stats" class="stats"></div>
        <div id="message" class="message"></div>
      </div>
    </section>
  </main>

  <!-- 브라우저 기본 색상창 대신 사용하는 커스텀 피커 -->
  <div
    id="pickerBackdrop"
    class="picker-backdrop"
    role="dialog"
    aria-modal="true"
    aria-labelledby="pickerTitle"
    hidden
  >
    <div class="picker-dialog">
      <h2 id="pickerTitle">색상 선택</h2>

      <div class="picker-control">
        <label for="pickerHue">색조</label>
        <input
          id="pickerHue"
          class="picker-slider"
          type="range"
          min="0"
          max="360"
          value="0"
        >
      </div>

      <div class="picker-control">
        <label for="pickerSaturation">채도</label>
        <input
          id="pickerSaturation"
          class="picker-slider"
          type="range"
          min="0"
          max="100"
          value="100"
        >
      </div>

      <div class="picker-control">
        <label for="pickerValue">값</label>
        <input
          id="pickerValue"
          class="picker-slider"
          type="range"
          min="0"
          max="100"
          value="100"
        >
      </div>

      <div class="picker-bottom">
        <div class="picker-selected">
          <span>선택한 색상</span>
          <span id="pickerPreview" class="picker-preview"></span>
          <span id="pickerHex" class="picker-hex">#ff0000</span>
        </div>
      </div>

      <div class="picker-actions">
        <button id="pickerCancel" type="button">취소</button>
        <button id="pickerApply" type="button">설정</button>
      </div>
    </div>
  </div>

  <script>
    const prefixInput = document.getElementById("prefix");
    const textInput = document.getElementById("gradientText");

    const startColor = document.getElementById("startColor");
    const middleColor = document.getElementById("middleColor");
    const endColor = document.getElementById("endColor");

    const startHex = document.getElementById("startHex");
    const middleHex = document.getElementById("middleHex");
    const endHex = document.getElementById("endHex");

    const midpointInput = document.getElementById("midpoint");
    const midValue = document.getElementById("midValue");
    const skipSpaces = document.getElementById("skipSpaces");

    const preview = document.getElementById("preview");
    const output = document.getElementById("output");
    const stats = document.getElementById("stats");
    const message = document.getElementById("message");

    const copyButton = document.getElementById("copyButton");
    const sampleButton = document.getElementById("sampleButton");
    const swapButton = document.getElementById("swapButton");
    const resetButton = document.getElementById("resetButton");

    const pickerBackdrop = document.getElementById("pickerBackdrop");
    const pickerHue = document.getElementById("pickerHue");
    const pickerSaturation = document.getElementById("pickerSaturation");
    const pickerValue = document.getElementById("pickerValue");
    const pickerPreview = document.getElementById("pickerPreview");
    const pickerHex = document.getElementById("pickerHex");
    const pickerCancel = document.getElementById("pickerCancel");
    const pickerApply = document.getElementById("pickerApply");

    let activeColorInput = null;
    let activeHexInput = null;
    let activeSwatch = null;

    function normalizeHex(value) {
      let hex = value.trim().replace("#", "");

      if (/^[0-9a-fA-F]{3}$/.test(hex)) {
        hex = hex
          .split("")
          .map(character => character + character)
          .join("");
      }

      if (!/^[0-9a-fA-F]{6}$/.test(hex)) {
        return null;
      }

      return "#" + hex.toLowerCase();
    }

    function hexToRgb(hex) {
      const normalized = normalizeHex(hex);

      if (!normalized) {
        return { r: 0, g: 0, b: 0 };
      }

      return {
        r: parseInt(normalized.slice(1, 3), 16),
        g: parseInt(normalized.slice(3, 5), 16),
        b: parseInt(normalized.slice(5, 7), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = value =>
        Math.max(0, Math.min(255, Math.round(value)))
          .toString(16)
          .padStart(2, "0");

      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function rgbToHsv({ r, g, b }) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const delta = max - min;

      let h = 0;

      if (delta !== 0) {
        if (max === r) {
          h = 60 * (((g - b) / delta) % 6);
        } else if (max === g) {
          h = 60 * ((b - r) / delta + 2);
        } else {
          h = 60 * ((r - g) / delta + 4);
        }
      }

      if (h < 0) {
        h += 360;
      }

      const s = max === 0 ? 0 : delta / max;
      const v = max;

      return {
        h: Math.round(h),
        s: Math.round(s * 100),
        v: Math.round(v * 100)
      };
    }

    function hsvToRgb(h, s, v) {
      s /= 100;
      v /= 100;

      const chroma = v * s;
      const section = (h % 360) / 60;
      const x = chroma * (1 - Math.abs((section % 2) - 1));

      let r1 = 0;
      let g1 = 0;
      let b1 = 0;

      if (section >= 0 && section < 1) {
        r1 = chroma;
        g1 = x;
      } else if (section < 2) {
        r1 = x;
        g1 = chroma;
      } else if (section < 3) {
        g1 = chroma;
        b1 = x;
      } else if (section < 4) {
        g1 = x;
        b1 = chroma;
      } else if (section < 5) {
        r1 = x;
        b1 = chroma;
      } else {
        r1 = chroma;
        b1 = x;
      }

      const m = v - chroma;

      return {
        r: (r1 + m) * 255,
        g: (g1 + m) * 255,
        b: (b1 + m) * 255
      };
    }

    function interpolateColor(colorA, colorB, amount) {
      return {
        r: colorA.r + (colorB.r - colorA.r) * amount,
        g: colorA.g + (colorB.g - colorA.g) * amount,
        b: colorA.b + (colorB.b - colorA.b) * amount
      };
    }

    function getGradientColor(position) {
      const start = hexToRgb(startColor.value);
      const middle = hexToRgb(middleColor.value);
      const end = hexToRgb(endColor.value);
      const midpoint = Number(midpointInput.value) / 100;

      if (position <= midpoint) {
        const localPosition = midpoint === 0 ? 0 : position / midpoint;
        return interpolateColor(start, middle, localPosition);
      }

      const localPosition =
        midpoint === 1
          ? 1
          : (position - midpoint) / (1 - midpoint);

      return interpolateColor(middle, end, localPosition);
    }

    function generateGradient() {
      const prefix = prefixInput.value;
      const characters = Array.from(textInput.value);
      const colorableCharacters = characters.filter(
        character => character !== "\n"
      );
      const total = colorableCharacters.length;

      let colorIndex = 0;
      let generated = prefix;

      preview.replaceChildren();
      preview.append(document.createTextNode(prefix));

      for (const character of characters) {
        if (character === "\n") {
          generated += "\n";
          preview.append(document.createElement("br"));
          continue;
        }

        const position =
          total <= 1 ? 0 : colorIndex / (total - 1);

        const color = rgbToHex(getGradientColor(position));
        const isSpace = character === " " || character === "\t";

        if (!(skipSpaces.checked && isSpace)) {
          generated += `<c${color.slice(1)}>`;
        }

        generated += character;

        const span = document.createElement("span");
        span.style.color = color;
        span.textContent = character;
        preview.append(span);

        colorIndex++;
      }

      if (total > 0) {
        generated += "</c>";
      }

      output.value = generated;
      stats.textContent =
        `텍스트 ${total}자 · 최종 코드 ${generated.length}자`;

      message.textContent = "";
    }

    function updateSwatch(colorInput, swatch) {
      swatch.style.background = colorInput.value;
    }

    function connectHexInput(colorInput, hexInput, swatch) {
      hexInput.addEventListener("input", () => {
        const normalized = normalizeHex(hexInput.value);

        if (normalized) {
          colorInput.value = normalized;
          updateSwatch(colorInput, swatch);
          generateGradient();
        }
      });

      hexInput.addEventListener("blur", () => {
        const normalized = normalizeHex(hexInput.value);

        if (normalized) {
          colorInput.value = normalized;
          hexInput.value = normalized;
        } else {
          hexInput.value = colorInput.value;
        }

        updateSwatch(colorInput, swatch);
        generateGradient();
      });
    }

    function updatePicker() {
      const h = Number(pickerHue.value);
      const s = Number(pickerSaturation.value);
      const v = Number(pickerValue.value);

      const pureHue = rgbToHex(hsvToRgb(h, 100, 100));
      const saturatedColor = rgbToHex(hsvToRgb(h, 100, v));
      const fullValueColor = rgbToHex(hsvToRgb(h, s, 100));
      const currentHex = rgbToHex(hsvToRgb(h, s, v));

      pickerHue.style.background =
        "linear-gradient(to right," +
        "#ff0000 0%," +
        "#ffff00 16.67%," +
        "#00ff00 33.33%," +
        "#00ffff 50%," +
        "#0000ff 66.67%," +
        "#ff00ff 83.33%," +
        "#ff0000 100%)";

      pickerSaturation.style.background =
        `linear-gradient(to right, #ffffff 0%, ${saturatedColor} 100%)`;

      pickerValue.style.background =
        `linear-gradient(to right, #000000 0%, ${fullValueColor} 100%)`;

      pickerPreview.style.background = currentHex;
      pickerHex.textContent = currentHex;
    }

    function openPicker(colorInput, hexInput, swatch) {
      activeColorInput = colorInput;
      activeHexInput = hexInput;
      activeSwatch = swatch;

      const hsv = rgbToHsv(hexToRgb(colorInput.value));

      pickerHue.value = hsv.h;
      pickerSaturation.value = hsv.s;
      pickerValue.value = hsv.v;

      updatePicker();

      pickerBackdrop.hidden = false;
      document.body.classList.add("modal-open");
      pickerHue.focus();
    }

    function closePicker() {
      pickerBackdrop.hidden = true;
      document.body.classList.remove("modal-open");
    }

    function applyPicker() {
      if (!activeColorInput || !activeHexInput || !activeSwatch) {
        closePicker();
        return;
      }

      const selected = pickerHex.textContent.toLowerCase();

      activeColorInput.value = selected;
      activeHexInput.value = selected;
      updateSwatch(activeColorInput, activeSwatch);
      generateGradient();
      closePicker();
    }

    document.querySelectorAll(".color-swatch").forEach(swatch => {
      const colorInput = document.getElementById(
        swatch.dataset.colorInput
      );
      const hexInput = document.getElementById(
        swatch.dataset.hexInput
      );

      updateSwatch(colorInput, swatch);
      connectHexInput(colorInput, hexInput, swatch);

      swatch.addEventListener("click", () => {
        openPicker(colorInput, hexInput, swatch);
      });
    });

    pickerHue.addEventListener("input", updatePicker);
    pickerSaturation.addEventListener("input", updatePicker);
    pickerValue.addEventListener("input", updatePicker);

    pickerCancel.addEventListener("click", closePicker);
    pickerApply.addEventListener("click", applyPicker);

    pickerBackdrop.addEventListener("click", event => {
      if (event.target === pickerBackdrop) {
        closePicker();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !pickerBackdrop.hidden) {
        closePicker();
      }
    });

    async function copyOutput() {
      if (!output.value) {
        message.textContent = "복사할 코드가 없습니다.";
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
        message.textContent = "코드를 클립보드에 복사했습니다.";
      } catch {
        output.select();
        document.execCommand("copy");
        message.textContent = "코드를 클립보드에 복사했습니다.";
      }
    }

    function setColor(colorInput, hexInput, value) {
      const normalized = normalizeHex(value);

      if (!normalized) {
        return;
      }

      colorInput.value = normalized;
      hexInput.value = normalized;

      const swatch = document.querySelector(
        `[data-color-input="${colorInput.id}"]`
      );

      if (swatch) {
        updateSwatch(colorInput, swatch);
      }
    }

    function loadSample() {
      prefixInput.value = "Hello ";
      textInput.value = "World";

      setColor(startColor, startHex, "#d40000");
      setColor(middleColor, middleHex, "#000000");
      setColor(endColor, endHex, "#a90000");

      midpointInput.value = "60";
      midValue.textContent = "60%";
      skipSpaces.checked = true;

      generateGradient();
    }

    function swapColors() {
      const oldStart = startColor.value;
      const oldEnd = endColor.value;

      setColor(startColor, startHex, oldEnd);
      setColor(endColor, endHex, oldStart);

      generateGradient();
    }

    function resetGenerator() {
      prefixInput.value = "";
      textInput.value = "";

      setColor(startColor, startHex, "#ff0000");
      setColor(middleColor, middleHex, "#000000");
      setColor(endColor, endHex, "#ffff00");

      midpointInput.value = "50";
      midValue.textContent = "50%";
      skipSpaces.checked = true;

      generateGradient();
    }

    prefixInput.addEventListener("input", generateGradient);
    textInput.addEventListener("input", generateGradient);
    skipSpaces.addEventListener("change", generateGradient);

    midpointInput.addEventListener("input", () => {
      midValue.textContent = midpointInput.value + "%";
      generateGradient();
    });

    copyButton.addEventListener("click", copyOutput);
    sampleButton.addEventListener("click", loadSample);
    swapButton.addEventListener("click", swapColors);
    resetButton.addEventListener("click", resetGenerator);

    generateGradient();
  </script>
</body>
</html>
